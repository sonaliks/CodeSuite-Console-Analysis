# Landing Zone Accelerator - Accounts Configuration
# This file defines AWS accounts and their organizational unit assignments.
#
# NOTE: This file intentionally references a non-existent OU name
# "Workloads-Production" (the actual OU is "Workloads-Prod")

mandatoryAccounts:
  - name: Management
    description: Organization management account
    email: management@example.com
    organizationalUnit: Security

workloadAccounts:
  - name: Production-App1
    description: Production workload account for App1
    email: prod-app1@example.com
    organizationalUnit: Workloads-Production  # ERROR: Should be "Workloads-Prod"

  - name: Staging-App1
    description: Staging workload account for App1
    email: staging-app1@example.com
    organizationalUnit: Workloads-Staging

  - name: Dev-App1
    description: Development workload account for App1
    email: dev-app1@example.com
    organizationalUnit: Workloads-Dev
